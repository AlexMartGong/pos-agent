# ============================================
# POS Printer Agent - configuration
# ============================================

# URL del servidor WebSocket del backend
server.url=ws://localhost:8080/ws/printer

# ID ?nico de esta estaci?n POS
# Cada terminal debe tener un ID diferente (POS1, POS2, CAJA1, etc.)
station.id=POS1

# Ruta del dispositivo de impresora
# Linux USB: /dev/usb/lp0, /dev/usb/lp1
# Windows: COM1, LPT1, o ruta de red \\\\server\\printer
printer.path=/dev/usb/lp5

# Informaci?n del negocio (aparece en el encabezado del ticket)
business.name=LA PASADITA
business.address=
business.phone=

# ============================================
# Configuraci?n de B?scula Torrey
# ============================================

# Puerto serial de la b?scula
# Linux: /dev/ttyACM0, /dev/ttyUSB0
# Windows: COM1, COM2, COM3
scale.port=/dev/ttyACM0

# Habilitar/deshabilitar b?scula
scale.enabled=true

# Auto-conectar al iniciar
scale.autoConnect=true

