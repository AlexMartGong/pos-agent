# ============================================
# POS Printer Agent - configuration
# ============================================

# URL del servidor WebSocket (default: ws://localhost:8080/ws/printer)
server.url=ws://localhost:8080/ws/printer

# Unique identifier for this POS station
station.id=POS1

# ============================================
# Printer configuration
# ============================================
# Linux: Ruta del dispositivo USB (ej: /dev/usb/lp0, /dev/usb/lp1)
# Recomendado: Crear regla udev para symlink fijo
printer.path=/dev/usb/lp5

# Windows: Nombre de la impresora instalada (como aparece en Panel de Control > Impresoras)
# Ejemplo: EPSON TM-T88V Receipt
# El nombre no cambia aunque desconectes/reconectes la impresora
printer.name=

business.name=LA PASADITA
business.address=
business.phone=

# ============================================
# Scale configuration
# ============================================

# Ports disponibles:
# Linux: /dev/ttyACM0, /dev/ttyUSB0
# Windows: COM1, COM2, COM3
scale.port=/dev/ttyACM0

# enable/disable scale REST server
scale.enabled=true

# Auto-connect to scale on startup
scale.autoConnect=true

